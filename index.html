<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>防災用品チェックリスト</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --red:#C0392B; --orange:#E67E22; --blue:#2471A3; --green:#1E8449; --purple:#6C3483;
  --gray0:#FAFAFA; --gray1:#F2F3F4; --gray2:#D5D8DC; --gray3:#AAB7B8; --gray4:#717D7E; --gray5:#2C3E50;
  --ink:#1A252F; --white:#FFFFFF; --radius:6px; --shadow:0 2px 8px rgba(0,0,0,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:#F2F3F4;color:#1A252F;font-size:13px;line-height:1.6;}

/* TOP BAR */
#topbar{background:#1A252F;color:#FFFFFF;padding:12px 24px;display:flex;align-items:center;gap:16px;position:-webkit-sticky;position:sticky;top:0;z-index:1000;box-shadow:0 3px 16px rgba(0,0,0,.5);-webkit-transform:translateZ(0);transform:translateZ(0);}
#topbar h1{font-size:15px;font-weight:700;letter-spacing:.04em;flex:1;color:#FFFFFF;}
.pill{background:rgba(255,255,255,.15);border-radius:20px;padding:4px 12px;font-size:11px;font-family:‘DM Mono’,monospace;color:#FFFFFF;}

/* LAYOUT */
#app{display:flex;min-height:calc(100vh - 48px);}

/* SIDEBAR */
#sidebar{width:272px;min-width:272px;background:#FFFFFF;border-right:1px solid #D5D8DC;padding:16px 14px;overflow-y:auto;position:sticky;top:48px;height:calc(100vh - 48px);}
#sidebar h2{font-size:10px;font-weight:700;letter-spacing:.12em;color:#717D7E;text-transform:uppercase;margin-bottom:10px;margin-top:18px;padding-bottom:4px;border-bottom:1px solid #D5D8DC;}
#sidebar h2:first-child{margin-top:0;}

.setting-row{margin-bottom:10px;}
.setting-row label.row-label{display:block;font-size:11px;font-weight:700;color:#2C3E50;margin-bottom:5px;}
.toggle-group{display:flex;flex-wrap:wrap;gap:4px;}
.toggle-btn{border:1.5px solid #D5D8DC;background:#F2F3F4;border-radius:4px;padding:5px 10px;font-size:11px;font-family:‘Noto Sans JP’,sans-serif;cursor:pointer;transition:all .15s;color:#2C3E50;user-select:none;line-height:1.4;}
.toggle-btn:hover{border-color:#2471A3;background:#EBF5FB;color:#2471A3;}
.toggle-btn.active{background:#2471A3;border-color:#2471A3;color:#FFFFFF;font-weight:700;box-shadow:0 1px 4px rgba(36,113,163,.35);}
select.setting-select{width:100%;border:1.5px solid #D5D8DC;border-radius:4px;padding:6px 10px;font-family:‘Noto Sans JP’,sans-serif;font-size:12px;background:#F2F3F4;color:#1A252F;cursor:pointer;}

.legend-item{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:11px;}
.legend-badge{display:inline-block;border-radius:3px;padding:1px 7px;font-size:10px;font-weight:700;min-width:52px;text-align:center;}
.badge-required{background:#FDECEA;color:#C0392B;border:1px solid #F5B7B1;}
.badge-recommend{background:#FEF9E7;color:#B7770D;border:1px solid #FAD7A0;}
.badge-nice{background:#EBF5FB;color:#2471A3;border:1px solid #AED6F1;}

.action-btns{display:flex;flex-direction:column;gap:6px;margin-top:6px;}
.action-btn{border:none;border-radius:6px;padding:8px;font-family:‘Noto Sans JP’,sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;}
.btn-print{background:#1A252F;color:#FFFFFF;}
.btn-print:hover{background:#34495E;}
.btn-reset{background:#F2F3F4;color:#717D7E;border:1px solid #D5D8DC;}
.btn-reset:hover{background:#D5D8DC;}
.btn-export{background:#1E8449;color:#FFFFFF;}
.btn-export:hover{background:#145A32;}

.cat-nav{display:flex;flex-direction:column;gap:1px;}
.cat-nav-item{padding:4px 8px;border-radius:4px;cursor:pointer;font-size:11px;font-weight:500;transition:background .12s;display:flex;justify-content:space-between;align-items:center;}
.cat-nav-item:hover{background:#F2F3F4;}
.cat-count{font-family:‘DM Mono’,monospace;font-size:10px;color:#717D7E;}

/* MAIN */
#main{flex:1;padding:20px;overflow-y:auto;}

/* SUMMARY BAR */
#summary-bar{background:#FFFFFF;border-radius:6px;padding:12px 18px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.10);}
.summary-top{display:flex;gap:20px;align-items:center;flex-wrap:wrap;}
.summary-stat{text-align:center;}
.summary-stat .num{font-size:20px;font-weight:900;font-family:‘DM Mono’,monospace;line-height:1;}
.summary-stat .lbl{font-size:10px;color:#717D7E;margin-top:1px;}
.num-green{color:#1E8449;} .num-red{color:#C0392B;} .num-gray{color:#717D7E;}

/* TABS */
#tabs{display:flex;gap:4px;margin-bottom:16px;background:#FFFFFF;padding:6px;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,.10);}
.tab{flex:1;padding:7px;text-align:center;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s;border:none;background:transparent;font-family:‘Noto Sans JP’,sans-serif;color:#717D7E;}
.tab:hover{background:#F2F3F4;}
.tab.active{background:#1A252F;color:#FFFFFF;}
.tab.hidden-tab{display:none;}

/* STATS BAR (共通) */
.view-summary-bar{background:#FFFFFF;border-radius:6px;padding:10px 16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.10);display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.view-summary-stat{text-align:center;padding:0 8px;}
.view-summary-stat .vsnum{font-size:18px;font-weight:900;font-family:‘DM Mono’,monospace;line-height:1;}
.view-summary-stat .vslbl{font-size:10px;color:#717D7E;margin-top:1px;}
.view-summary-divider{width:1px;height:36px;background:#D5D8DC;}

#search-wrap{margin-bottom:12px;}
#search-input{width:100%;padding:8px 14px;border:1.5px solid #D5D8DC;border-radius:6px;font-family:‘Noto Sans JP’,sans-serif;font-size:13px;background:#FFFFFF;box-shadow:0 2px 8px rgba(0,0,0,.10);}
#search-input:focus{outline:none;border-color:#2471A3;}
.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
.filter-label{font-size:11px;color:#717D7E;}
.filter-chip{border:1.5px solid #D5D8DC;background:#FFFFFF;border-radius:20px;padding:4px 12px;font-size:11px;cursor:pointer;font-family:‘Noto Sans JP’,sans-serif;transition:all .15s;color:#2C3E50;}
.filter-chip:hover{border-color:#2471A3;background:#EBF5FB;color:#2471A3;}
.filter-chip.active{background:#2471A3;border-color:#2471A3;color:#FFFFFF;font-weight:700;box-shadow:0 1px 4px rgba(36,113,163,.35);}
.filter-chip.active-green{background:#1E8449;border-color:#1E8449;color:#FFFFFF;font-weight:700;box-shadow:0 1px 4px rgba(30,132,73,.35);}

/* SECTION */
.section{background:#FFFFFF;border-radius:6px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.10);overflow:hidden;}
.section-header{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;user-select:none;border-bottom:1px solid #D5D8DC;}
.section-header:hover{background:#FAFAFA;}
.section-icon{font-size:16px;}
.section-title{font-size:13px;font-weight:700;flex:1;}
.section-stats{font-family:‘DM Mono’,monospace;font-size:11px;color:#717D7E;}
.section-toggle{font-size:11px;color:#717D7E;transition:transform .2s;}
.section.collapsed .section-toggle{transform:rotate(-90deg);}
.section.collapsed .section-body{display:none;}

.section-header-static{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #D5D8DC;background:#FAFAFA;white-space:nowrap;overflow:hidden;}
.subcategory-header{padding:6px 16px;font-size:10px;font-weight:700;color:#717D7E;background:#F2F3F4;border-bottom:1px solid #D5D8DC;letter-spacing:.08em;text-transform:uppercase;}

/* TABLE */
.item-table{width:100%;border-collapse:collapse;}
.item-table th{background:#F2F3F4;padding:6px 10px;font-size:10px;font-weight:700;color:#717D7E;text-align:left;letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid #D5D8DC;white-space:nowrap;}
.item-table td{padding:7px 10px;border-bottom:1px solid #D5D8DC;vertical-align:top;font-size:12px;}
.item-table tr:last-child td{border-bottom:none;}
.item-table tr.hidden-item{display:none;}
.item-table tr.dimmed-item td{opacity:.28;background:#FAFAFA;}
.item-table tr.checked-item td{background:#F0FBF4;}
.item-table tr:hover:not(.dimmed-item) td{background:#FAFAFA;}

.check-cell{width:34px;text-align:center;vertical-align:middle!important;}
input[type=checkbox].item-check{width:15px;height:15px;cursor:pointer;accent-color:#1E8449;}
.item-name{font-weight:600;line-height:1.4;}
.item-name.checked-label{text-decoration:line-through;color:#AAB7B8;font-weight:400;}
.item-sub{font-size:11px;color:#2C3E50;margin-top:2px;line-height:1.5;}
.item-location{font-size:10px;color:#2471A3;margin-top:2px;}
.item-pack-badge{display:inline-block;font-size:10px;color:#1E8449;font-weight:700;margin-left:4px;}

.badge{display:inline-block;border-radius:3px;padding:1px 6px;font-size:10px;font-weight:700;white-space:nowrap;}
.badge-r{background:#FDECEA;color:#C0392B;}
.badge-y{background:#FEF9E7;color:#9A7D0A;}
.badge-b{background:#EBF5FB;color:#2471A3;}

.qty-cell{width:72px;}
.qty-input{width:64px;border:1px solid #D5D8DC;border-radius:3px;padding:2px 5px;text-align:center;font-family:‘DM Mono’,monospace;font-size:11px;background:transparent;}
.qty-input:focus{outline:none;border-color:#2471A3;}

/* OUTING / CAR ITEMS (統一UI) */
.outing-section{background:#FFFFFF;border-radius:6px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.10);overflow:hidden;}
.outing-table{width:100%;border-collapse:collapse;}
.outing-table th{background:#F2F3F4;padding:6px 10px;font-size:10px;font-weight:700;color:#717D7E;text-align:left;letter-spacing:.06em;border-bottom:1px solid #D5D8DC;}
.outing-table td{padding:7px 10px;border-bottom:1px solid #D5D8DC;vertical-align:top;font-size:12px;}
.outing-table tr:last-child td{border-bottom:none;}
.outing-table tr.outing-checked td{background:#F0FBF4;}
.outing-table tr:hover td{background:#FAFAFA;}
.outing-name{font-weight:600;}
.outing-name.checked-label{text-decoration:line-through;color:#AAB7B8;font-weight:400;}
.outing-detail{font-size:11px;color:#2C3E50;margin-top:1px;}
.weight-badge{font-size:10px;color:#717D7E;font-family:‘DM Mono’,monospace;}

/* PREACTION */
.preaction-item{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border-bottom:1px solid #D5D8DC;}
.preaction-item:last-child{border-bottom:none;}
.preaction-item:hover{background:#FAFAFA;}
.preaction-item.preaction-done{background:#F0FBF4;}
.preaction-check{width:15px;height:15px;cursor:pointer;accent-color:#6C3483;margin-top:2px;flex-shrink:0;}
.preaction-body{flex:1;}
.preaction-name{font-size:12px;font-weight:600;}
.preaction-name.checked-label{text-decoration:line-through;color:#AAB7B8;}
.preaction-sub{font-size:11px;color:#2C3E50;margin-top:2px;}
.preaction-target{font-size:10px;color:#6C3483;margin-top:2px;}

/* TIPS BOX */
.tips-box{background:#FFFFFF;border-radius:6px;padding:14px 18px;box-shadow:0 2px 8px rgba(0,0,0,.10);margin-top:14px;}
.tips-box h3{font-size:13px;font-weight:700;margin-bottom:8px;}
.tips-box ul{font-size:12px;line-height:2;padding-left:18px;color:#2C3E50;}

/* MOBILE SIDEBAR TOGGLE */
#sidebar-toggle{display:none;width:100%;background:#FFFFFF;color:#1A252F;border:none;border-top:1px solid #D5D8DC;border-bottom:1px solid #D5D8DC;padding:10px 16px;font-family:‘Noto Sans JP’,sans-serif;font-size:12px;font-weight:600;cursor:pointer;text-align:left;}
#sidebar-toggle-arrow{transition:transform .2s;display:inline-block;margin-left:6px;font-size:10px;}
#sidebar-toggle.open #sidebar-toggle-arrow{transform:rotate(180deg);}

@media (max-width:700px){
#app{flex-direction:column;}
#sidebar-toggle{display:block;order:1;}
#sidebar{width:100%;min-width:unset;height:auto;position:static;border-right:none;overflow:hidden;max-height:0;transition:max-height .35s ease;order:2;visibility:hidden;}
#sidebar.open{max-height:2000px;border-bottom:1px solid #D5D8DC;visibility:visible;}
#sidebar-inner{padding:12px 14px 16px;}
#main{padding:12px 10px;order:3;}
#tabs .tab{font-size:10px;padding:6px 3px;}
.item-table th:nth-child(4),.item-table td:nth-child(4){display:none;}
#topbar h1{font-size:13px;}
}

@media print{
#sidebar,#topbar,#sidebar-toggle,.action-btns,#search-wrap,.filter-row,#tabs,.qty-input{display:none!important;}
body{background:white;font-size:11px;}
#app{display:block;}
#main{padding:8px;}
.section.collapsed .section-body{display:block!important;}
.dimmed-item{display:none!important;}
.item-table th,.item-table td{padding:3px 6px;}
#summary-bar{box-shadow:none;border:1px solid #ddd;}
}
</style>

</head>
<body>
<div id="topbar">
  <h1>防災用品チェックリスト</h1>
  <span class="pill" id="topbar-stat">0 / 0 入手済み</span>
</div>

<div id="app">
<button id="sidebar-toggle" onclick="toggleSidebar()">⚙️ 条件を設定する（タップで開閉）<span id="sidebar-toggle-arrow">▼</span></button>
<div id="sidebar">
<div id="sidebar-inner">
  <h2>⚙️ 家族・住環境の設定</h2>
  <div class="setting-row">
    <label class="row-label">家族構成</label>
    <div class="toggle-group">
      <button class="toggle-btn" data-key="solo" onclick="toggleSetting(this)">一人暮らし</button>
      <button class="toggle-btn" data-key="couple" onclick="toggleSetting(this)">夫婦2人</button>
      <button class="toggle-btn" data-key="adults3" onclick="toggleSetting(this)">大人3人以上</button>
      <button class="toggle-btn" data-key="baby" onclick="toggleSetting(this)">乳幼児あり</button>
      <button class="toggle-btn" data-key="kids" onclick="toggleSetting(this)">小学生以上の子</button>
      <button class="toggle-btn" data-key="elder" onclick="toggleSetting(this)">高齢者同居</button>
      <button class="toggle-btn" data-key="pet" onclick="toggleSetting(this)">ペットあり</button>
      <button class="toggle-btn" data-key="pregnant" onclick="toggleSetting(this)">妊婦・授乳中</button>
    </div>
  </div>
  <div class="setting-row">
    <label class="row-label">住居タイプ</label>
    <div class="toggle-group">
      <button class="toggle-btn" data-key="mansion_high" onclick="toggleSetting(this)">マンション高層（4F以上）</button>
      <button class="toggle-btn" data-key="mansion_low" onclick="toggleSetting(this)">マンション低層（1〜3F）</button>
      <button class="toggle-btn" data-key="house" onclick="toggleSetting(this)">戸建て</button>
    </div>
  </div>
  <div class="setting-row">
    <label class="row-label">立地・ハザード</label>
    <div class="toggle-group">
      <button class="toggle-btn" data-key="coast" onclick="toggleSetting(this)">海・川沿い（浸水・津波）</button>
      <button class="toggle-btn" data-key="mountain" onclick="toggleSetting(this)">山・丘陵地（土砂）</button>
    </div>
  </div>
  <div class="setting-row">
    <label class="row-label">車</label>
    <div class="toggle-group">
      <button class="toggle-btn" data-key="car" onclick="toggleSetting(this)">車あり</button>
    </div>
  </div>
  <h2>📊 凡例</h2>
  <div class="legend-item"><span class="legend-badge badge-required">🔴 必須</span>命に直結・最優先</div>
  <div class="legend-item"><span class="legend-badge badge-recommend">🟡 推奨</span>1週間の生活維持に必要</div>
  <div class="legend-item"><span class="legend-badge badge-nice">🔵 あると安心</span>余裕があれば備えたい</div>
  <div style="margin-top:8px;">
    <div class="legend-item"><span style="font-size:13px;">🎒</span><span style="font-size:11px;">避難リュックに入れる品目</span></div>
  </div>

  <h2>🔗 カテゴリ</h2>
  <div class="cat-nav" id="cat-nav"></div>

  <h2>⚡ アクション</h2>
  <div class="action-btns">
    <button class="action-btn btn-print" onclick="window.print()">🖨️ 印刷する</button>
    <button class="action-btn btn-export" onclick="exportCSV()">📥 CSV書き出し</button>
    <button class="action-btn btn-reset" onclick="resetAll()">🔄 チェックをリセット</button>
  </div>
</div><!-- /sidebar-inner -->
</div><!-- /sidebar -->

<div id="main">
  <div id="tabs">
    <button class="tab active" data-view="home" onclick="switchTab(this)">🏠 備蓄品</button>
    <button class="tab" data-view="outing" onclick="switchTab(this)">👜 外出携行品</button>
    <button class="tab" data-view="car" id="tab-car" onclick="switchTab(this)">🚗 車載品</button>
    <button class="tab" data-view="preaction" onclick="switchTab(this)">✅ 事前対処</button>
  </div>

  <!-- ── 備蓄品リスト ── -->

  <div id="view-home">
    <div id="summary-bar">
      <div class="summary-top">
        <div class="summary-stat">
          <div class="num num-green" id="stat-checked">0</div>
          <div class="lbl">入手済み</div>
        </div>
        <div class="summary-stat">
          <div class="num num-red" id="stat-remain">0</div>
          <div class="lbl">未入手</div>
        </div>
        <div class="summary-stat">
          <div class="num num-red" id="stat-req-remain">0</div>
          <div class="lbl">必須・未入手</div>
        </div>
        <div class="summary-stat">
          <div class="num num-gray" id="stat-total">0</div>
          <div class="lbl">品目数</div>
        </div>
      </div>
    </div>
    <div id="search-wrap"><input id="search-input" type="text" placeholder="🔍 品目名・説明で検索" oninput="applyFilters()"></div>
    <div class="filter-row">
      <button class="filter-chip active" data-priority="all" onclick="togglePriorityChip(this)">すべて</button>
      <button class="filter-chip" data-priority="required" onclick="togglePriorityChip(this)">🔴 必須のみ</button>
      <button class="filter-chip" data-priority="required,recommend" onclick="togglePriorityChip(this)">🔴🟡 必須・推奨</button>
      <button class="filter-chip" data-pack="true" id="chip-pack" onclick="togglePackFilter(this)">🎒 リュック</button>
    </div>
    <div id="sections-container"></div>
  </div>

  <!-- ── 事前対処リスト ── -->

  <div id="view-preaction" style="display:none">
    <div class="view-summary-bar" id="preaction-summary">
      <div class="view-summary-stat">
        <div class="vsnum num-green" id="pre-stat-done">0</div>
        <div class="vslbl">実施済み</div>
      </div>
      <div class="view-summary-divider"></div>
      <div class="view-summary-stat">
        <div class="vsnum num-red" id="pre-stat-remain">0</div>
        <div class="vslbl">未実施</div>
      </div>
      <div class="view-summary-divider"></div>
      <div class="view-summary-stat">
        <div class="vsnum num-gray" id="pre-stat-total">0</div>
        <div class="vslbl">項目数</div>
      </div>
    </div>
    <div class="outing-section">
      <div class="section-header-static">
        <span class="section-icon">✅</span>
        <span class="section-title">災害前にやっておくこと</span>
      </div>
      <div id="preaction-list"></div>
    </div>
  </div>

  <!-- ── 外出時リスト ── -->

  <div id="view-outing" style="display:none">
    <div class="view-summary-bar">
      <div class="view-summary-stat">
        <div class="vsnum num-green" id="outing-stat-done">0</div>
        <div class="vslbl">入手済み</div>
      </div>
      <div class="view-summary-divider"></div>
      <div class="view-summary-stat">
        <div class="vsnum num-red" id="outing-stat-remain">0</div>
        <div class="vslbl">未入手</div>
      </div>
      <div class="view-summary-divider"></div>
      <div class="view-summary-stat">
        <div class="vsnum num-gray" id="outing-stat-total">0</div>
        <div class="vslbl">品目数</div>
      </div>
    </div>
    <div class="outing-section">
      <div class="section-header-static">
        <span class="section-icon">👜</span>
        <span class="section-title">外出時 携行品</span>
        <span style="font-size:10px;color:#717D7E;margin-left:8px;">合計500g以内目安</span>
      </div>
      <div id="outing-tbody-wrap"></div>
    </div>
  </div>

  <!-- ── 車載リスト ── -->

  <div id="view-car" style="display:none">
    <div class="view-summary-bar">
      <div class="view-summary-stat">
        <div class="vsnum num-green" id="car-stat-done">0</div>
        <div class="vslbl">入手済み</div>
      </div>
      <div class="view-summary-divider"></div>

// STATE
// ═══════════════════════════════════════════════════
function lsGet(key, fallback) { try { return JSON.parse(localStorage.getItem(key) || fallback); } catch(e) { return JSON.parse(fallback); } }
function lsSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} }

let settings = {};
let checkedItems  = lsGet('ec3_checked', '{}');
let quantities    = lsGet('ec3_qty',     '{}');
let outingChecked = lsGet('ec3_outing',  '{}');
let carChecked    = lsGet('ec3_car',     '{}');
let preChecked    = lsGet('ec3_pre',     '{}');
let activePhase   = 'all'; // unused but kept for compat
let activePriority = 'all';
let activePackFilter = false;
let activePreFilter  = 'all';
let activeOutingFilter = 'all';
let activeCarFilter  = 'all';
let currentView   = 'home';

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function isRelevant(flags) {
  if (flags === 'all' || !flags || flags.length === 0) return true;
  const ak = Object.keys(settings).filter(k => settings[k]);
  if (ak.length === 0) return true;
  return flags.some(f => ak.includes(f));
}
function matchPhase(item) { return true; }
function matchSearch(item) {
  const q = (document.getElementById('search-input')?.value || '').trim().toLowerCase();
  return !q || item.name.toLowerCase().includes(q) || (item.sub||'').toLowerCase().includes(q);
}
function matchPriority(item) {
  if (activePriority === 'all') return true;
  return activePriority.split(',').includes(item.priority);
}
function matchPack(item) { return !activePackFilter || !!item.pack; }
function badge(p) {
  if (p==='required')  return '<span class="badge badge-r">🔴 必須</span>';
  if (p==='recommend') return '<span class="badge badge-y">🟡 推奨</span>';
  return '<span class="badge badge-b">🔵 あると安心</span>';
}
function phaseBadge(p) { return `<span class="phase-badge phase-${p}">P${p}</span>`; }
function saveState() {
  lsSet('ec3_checked', checkedItems);
  lsSet('ec3_qty',     quantities);
  lsSet('ec3_outing',  outingChecked);
  lsSet('ec3_car',     carChecked);
  lsSet('ec3_pre',     preChecked);
}

// ═══════════════════════════════════════════════════
// RENDER: 備蓄品
// ═══════════════════════════════════════════════════
function renderSections() {
  const container = document.getElementById('sections-container');
  const navEl     = document.getElementById('cat-nav');
  container.innerHTML = '';
  navEl.innerHTML = '';

  let totC=0, totR=0, totV=0, reqR=0;

  CATEGORIES.forEach(cat => {
    const visible = cat.items.filter(i => matchSearch(i) && matchPriority(i) && matchPhase(i) && matchPack(i));
    if (!visible.length) return;

    let catC=0, catT=0, rows='';
    visible.forEach(item => {
      const id = cat.id+'_'+item.name;
      const rel = isRelevant(item.flags);
      const chk = !!checkedItems[id];
      const qty = quantities[id] || '';
      if (rel) { catT++; totV++; if(chk){catC++;totC++;}else{totR++;if(item.priority==='required')reqR++;} }
      const rc = !rel ? 'dimmed-item' : (chk ? 'checked-item' : '');
      const packIcon = item.pack ? '<span class="item-pack-badge" title="避難リュックに入れる">🎒</span>' : '';
      rows += `<tr class="${rc}" id="row-${CSS.escape(id)}">
        <td class="check-cell"><input type="checkbox" class="item-check" ${chk?'checked':''} onchange="toggleCheck('${id}')"></td>
        <td>
          <div class="item-name ${chk?'checked-label':''}">${item.name}${packIcon}</div>
          <div class="item-sub">${item.sub||''}</div>
          ${item.location?`<div class="item-location">${item.location}</div>`:''}
        </td>
        <td>${badge(item.priority)}</td>
        <td class="qty-cell"><input class="qty-input" type="text" value="${qty||item.qty||''}" onchange="saveQty('${id}',this.value)" placeholder="${item.qty||''}"></td>
      </tr>`;
    });

    const pct = catT>0 ? Math.round(catC/catT*100) : 0;
    const sec = document.createElement('div');
    sec.className='section'; sec.id='sec-'+cat.id;
    sec.innerHTML=`
      <div class="section-header" onclick="toggleSection('${cat.id}')">
        <span class="section-icon">${cat.icon}</span>
        <span class="section-title">${cat.title}</span>
        <span class="section-stats">${catC}/${catT} (${pct}%)</span>
        <span class="section-toggle">▼</span>
      </div>
      <div class="section-body">
        <table class="item-table">
          <thead><tr>
            <th style="width:34px">✓</th>
            <th>品目・用途・保管場所</th>
            <th style="width:90px">優先度</th>
            <th style="width:80px">数量目安</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    container.appendChild(sec);

    const nav = document.createElement('div');
    nav.className='cat-nav-item';
    nav.innerHTML=`${cat.icon} ${cat.title} <span class="cat-count">${catC}/${catT}</span>`;
    nav.onclick=()=>document.getElementById('sec-'+cat.id)?.scrollIntoView({behavior:'smooth',block:'start'});
    navEl.appendChild(nav);
  });

  document.getElementById('stat-checked').textContent = totC;
  document.getElementById('stat-remain').textContent  = totR;
  document.getElementById('stat-total').textContent   = totV;
  document.getElementById('stat-req-remain').textContent = reqR;
  document.getElementById('topbar-stat').textContent = `${totC} / ${totV} 入手済み`;
  saveState();
}

// RENDER: 事前対処・外出・車載（カテゴリ小見出し共通）
// ═══════════════════════════════════════════════════
function renderWithCategories(items, wrapId, prefix, checkedMap, toggleFn, extraCol) {
  const wrap = document.getElementById(wrapId);
  if (!wrap) return;
  let done = 0, html = '', lastCat = null;
  items.forEach((item, i) => {
    const id = prefix + '_' + i;
    const chk = !!checkedMap[id];
    if (chk) done++;
    if (item.cat && item.cat !== lastCat) {
      html += `<div class="subcategory-header">${item.cat}</div>`;
      lastCat = item.cat;
    }
    if (extraCol === 'weight') {
      html += `<div class="preaction-item ${chk ? 'preaction-done' : ''}">
        <input type="checkbox" class="preaction-check" ${chk ? 'checked' : ''} onchange="${toggleFn}('${id}',this.checked)">
        <div class="preaction-body" style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
          <div style="flex:1;">
            <div class="preaction-name ${chk ? 'checked-label' : ''}">${item.name}</div>
            <div class="preaction-sub">${item.detail || ''}</div>
          </div>
          <div style="font-size:10px;color:#717D7E;font-family:'DM Mono',monospace;white-space:nowrap;flex-shrink:0;">${item.weight || ''}</div>
        </div>
      </div>`;
    } else if (extraCol === 'target') {
      html += `<div class="preaction-item ${chk ? 'preaction-done' : ''}">
        <input type="checkbox" class="preaction-check" ${chk ? 'checked' : ''} onchange="${toggleFn}('${id}',this.checked)">
        <div class="preaction-body">
          <div class="preaction-name ${chk ? 'checked-label' : ''}">${item.name}</div>
          <div class="preaction-sub">${item.sub || ''}</div>
          <div class="preaction-target">📌 対象：${item.target}</div>
        </div>
      </div>`;
    } else {
      html += `<div class="preaction-item ${chk ? 'preaction-done' : ''}">
        <input type="checkbox" class="preaction-check" ${chk ? 'checked' : ''} onchange="${toggleFn}('${id}',this.checked)">
        <div class="preaction-body">
          <div class="preaction-name ${chk ? 'checked-label' : ''}">${item.name}</div>
          <div class="preaction-sub">${item.detail || ''}</div>
        </div>
      </div>`;
    }
  });
  wrap.innerHTML = html;
  return done;
}

function renderPreaction() {
  const done = renderWithCategories(PREACTIONS, 'preaction-list', 'pre', preChecked, 'togglePre', 'target');
  const total = PREACTIONS.length;
  const remain = total - done;
  document.getElementById('pre-stat-done').textContent   = done;
  document.getElementById('pre-stat-remain').textContent = remain;
  document.getElementById('pre-stat-total').textContent  = total;
}

function renderOutingList() {
  const done = renderWithCategories(OUTING_ITEMS, 'outing-tbody-wrap', 'outing', outingChecked, 'toggleOuting', 'weight');
  const total = OUTING_ITEMS.length;
  const remain = total - done;
  document.getElementById('outing-stat-done').textContent   = done;
  document.getElementById('outing-stat-remain').textContent = remain;
  document.getElementById('outing-stat-total').textContent  = total;
}

function renderCarList() {
  const done = renderWithCategories(CAR_ITEMS, 'car-tbody-wrap', 'car', carChecked, 'toggleCar', 'none');
  const total = CAR_ITEMS.length;
  const remain = total - done;
  document.getElementById('car-stat-done').textContent   = done;
  document.getElementById('car-stat-remain').textContent = remain;
  document.getElementById('car-stat-total').textContent  = total;
}

// ═══════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════
function toggleSetting(btn) {
  const k=btn.dataset.key;
  settings[k]=!settings[k];
  btn.classList.toggle('active',settings[k]);
  // 住居タイプは排他（1つだけ選べる）
  const mutex={mansion_high:['mansion_low','house'],mansion_low:['mansion_high','house'],house:['mansion_high','mansion_low']};
  // 家族構成の世帯人数系は排他
  const personMutex={solo:['couple','adults3'],couple:['solo','adults3'],adults3:['solo','couple']};
  const allMutex = {...mutex, ...personMutex};
  if(settings[k] && allMutex[k]) allMutex[k].forEach(ok=>{
    settings[ok]=false;
    document.querySelectorAll(`.toggle-btn[data-key="${ok}"]`).forEach(b=>b.classList.remove('active'));
  });
  applyFilters();
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const btn = document.getElementById('sidebar-toggle');
  sb.classList.toggle('open');
  btn.classList.toggle('open');
}

function toggleCheck(id) {
  checkedItems[id]=!checkedItems[id];
  saveState(); renderSections();
}
function saveQty(id,val) { quantities[id]=val; saveState(); }
function toggleOuting(id,val) { outingChecked[id]=val; saveState(); renderOutingList(); }
function toggleCar(id,val) { carChecked[id]=val; saveState(); renderCarList(); }
function togglePre(id,val) { preChecked[id]=val; saveState(); renderPreaction(); }
function toggleSection(catId) { document.getElementById('sec-'+catId)?.classList.toggle('collapsed'); }

function togglePriorityChip(btn) {
  document.querySelectorAll('.filter-chip[data-priority]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activePriority = btn.dataset.priority;
  renderSections();
}
function togglePackFilter(btn) {
  activePackFilter = !activePackFilter;
  btn.classList.toggle('active-green', activePackFilter);
  btn.classList.toggle('active', false);
  renderSections();
}
function togglePreFilter(btn) {
  document.querySelectorAll('.filter-chip[data-prefilter]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); activePreFilter=btn.dataset.prefilter; renderPreaction();
}
function toggleOutingFilter(btn) {
  document.querySelectorAll('.filter-chip[data-outingfilter]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); activeOutingFilter=btn.dataset.outingfilter; renderOutingList();
}
function toggleCarFilter(btn) {
  document.querySelectorAll('.filter-chip[data-carfilter]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); activeCarFilter=btn.dataset.carfilter; renderCarList();
}
function applyFilters() { renderSections(); }

function switchTab(btn) { switchTabById(btn.dataset.view); }
function switchTabById(view) {
  currentView=view;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.tab[data-view="${view}"]`)?.classList.add('active');
  ['home','preaction','outing','car'].forEach(v=>{
    const el=document.getElementById('view-'+v);
    if(el) el.style.display=v===view?'':'none';
  });
  if(view==='outing')   renderOutingList();
  if(view==='car')      renderCarList();
  if(view==='preaction') renderPreaction();
}

function resetAll() {
  if(!confirm('すべてのチェックをリセットしますか？')) return;
  checkedItems={}; quantities={}; outingChecked={}; carChecked={}; preChecked={};
  ['ec3_checked','ec3_qty','ec3_outing','ec3_car','ec3_pre'].forEach(k=>{ try{localStorage.removeItem(k);}catch(e){} });
  renderSections(); renderPreaction();
}

function exportCSV() {
  let csv='\uFEFF品目名,カテゴリ,優先度,フェーズ,数量目安,入手済み,リュック\n';
  CATEGORIES.forEach(cat=>{
    cat.items.forEach(item=>{
      const id=cat.id+'_'+item.name;
      const row=[item.name,cat.title,item.priority==='required'?'必須':item.priority==='recommend'?'推奨':'あると安心','P'+item.phase,item.qty,checkedItems[id]?'✓':'',item.pack?'🎒':''];
      csv+=row.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')+'\n';
    });
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='防災用品チェックリスト.csv'; a.click();
  URL.revokeObjectURL(url);
}

// INIT
document.addEventListener('DOMContentLoaded', function() {
  try { renderSections(); } catch(e) { console.error('renderSections error:', e); }
  try { renderPreaction(); } catch(e) {}
  try { renderOutingList(); } catch(e) {}
  try { renderCarList(); } catch(e) {}
});
</script>
